<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate Payslip | BrightPath</title>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { margin: 0; padding: 0; background: white; font-size: 11pt; }
            @page { size: A4; margin: 1.5cm; }
            .letterhead { margin-bottom: 1cm; }
            .footer { margin-top: 1cm; text-align: center; font-size: 9pt; }
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        .letterhead { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #2c3e50; padding-bottom: 20px; background: white; border-radius: 12px; }
        .letterhead-content { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
        .logo-img { max-height: 70px; }
        .company-name { font-size: 28px; font-weight: bold; color: #2c3e50; }
        .company-address { font-size: 12px; color: #555; margin-top: 5px; }
        .report-title { font-size: 20px; margin: 20px 0; text-align: center; font-weight: bold; }
        .form-container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-container label { font-weight: 600; display: block; margin-bottom: 4px; }
        .form-container select, .form-container input[type="date"] { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
        .btn-generate { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-generate:hover { background: #2563eb; }
        .alert-info { background: #e0f2fe; color: #0369a1; padding: 10px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <!-- Letterhead with logo -->
    <div class="letterhead">
        <div class="letterhead-content">
            <img src="{{ url_for('static', filename='img/logo.png') }}" 
                 alt="BrightPath Logo" 
                 class="logo-img" 
                 onerror="this.style.display='none'">
            <div>
                <div class="company-name">BrightPath Trading Co.</div>
                <div class="company-address">123 Main Street, San Carlos City, Pangasinan, Philippines<br>Tel: (075) 123-4567 | Email: hr@brightpath.com</div>
            </div>
        </div>
    </div>

    <div class="report-title">GENERATE PAYSLIP</div>
    <p style="text-align:center;">Select employee and cutoff period</p>

    <div class="form-container">
        <form method="GET" action="{{ url_for('admin_report_payslip') }}" target="_blank">
            <label>Employee</label>
            <select name="employee_id" required>
                <option value="">-- Select Employee --</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}">{{ emp.name }} ({{ emp.position or 'Staff' }})</option>
                {% endfor %}
            </select>
            <label>Cutoff Start</label>
            <input type="date" name="start_date" required>
            <label>Cutoff End</label>
            <input type="date" name="end_date" required>
            <button type="submit" class="btn-generate"><i class="fas fa-print"></i> Generate Payslip</button>
        </form>
        <div class="alert-info">
            <i class="fas fa-info-circle"></i> The payslip opens in a new tab. You can print or save as PDF.
        </div>
    </div>
</body>
</html>
