<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Employee Registration | BrightPath</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/employee/signup.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body class="reg-wrapper">
    <div class="auth-card-small">
        <i class="fas fa-user-plus main-icon" style="color: #10b981;"></i>
        <h2>Manual Registration</h2>
        <p class="subtitle"> fill in the details below</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning" style="background: #fef3c7; padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 0.85rem;">
                        <i class="fas fa-info-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('employee_manual_register') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="input-group">
                 
                <input type="text" name="full_name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                 
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                 
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                 
                <select name="position" class="form-control" style="width: 100%; padding: 14px 16px 14px 48px; border-radius: 16px; border: 1px solid #e2e8f0; background: #f8fafc;">
                    <option value="Staff">Staff</option>
                    <option value="Sales and Marketing Staff">Sales and Marketing Staff</option>
                    <option value="Operations and Delivery Staff">Operations and Delivery Staff</option>
                    <option value="HR Officer">HR Officer</option>
                    <option value="Finance Officer">Finance Officer</option>
                    <option value="Admin Staff">Admin Staff</option>
                    <option value="Delivery Driver">Delivery Driver</option>
                    <option value="Warehouse Staff">Warehouse Staff</option>
                </select>
            </div>
            <div class="input-group">
                 
            </div>
            <button type="submit" class="btn-complete" style="background: #10b981;">
                <i class="fas fa-save"></i> Register Employee
            </button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('employee_signup') }}"><i class="fas fa-camera"></i> Register with Face Instead</a>
            &nbsp;|&nbsp;
            <a href="{{ url_for('index') }}"><i class="fas fa-sign-in-alt"></i> Back to Login</a>
        </div>
    </div>
</body>
</html>
