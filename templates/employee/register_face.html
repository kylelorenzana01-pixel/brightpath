<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Registration | BrightPath</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>
        .camera-container {
            width: 100%;
            max-width: 500px;
            height: 350px;
            background: #000;
            margin: 20px auto;
            border-radius: 15px;
            border: 2px solid #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Lalabas lang 'to 'pag pinindot ang Open Camera */
        }
        .progress-bar {
            width: 80%;
            height: 10px;
            background: #1e293b;
            margin: 10px auto;
            border-radius: 5px;
            display: none;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: #22c55e;
            border-radius: 5px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="glass-card" style="text-align: center; padding: 40px;">
    <h2>Face Registration</h2>
    <p>User: <span id="display-name" style="font-weight: bold; color: #60a5fa;">{{ employee_name }}</span></p>

    <div class="camera-container">
        <div id="placeholder" style="color: #475569;">Camera is OFF</div>
        <img id="video-feed" src="" alt="Face Stream">
    </div>

    <div id="status" style="margin-bottom: 10px; color: #3b82f6;">Ready to start...</div>

    <div class="progress-bar" id="progress-container">
        <div id="progress-fill"></div>
    </div>

    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
        <button id="btn-open" class="btn" onclick="startCamera()" style="background: #3b82f6; padding: 10px 20px; border: none; color: white; border-radius: 8px; cursor: pointer;">1. Open Camera</button>
        
        <button id="btn-capture" class="btn" onclick="runAutoCapture()" disabled style="background: #f59e0b; padding: 10px 20px; border: none; color: white; border-radius: 8px; opacity: 0.5; cursor: not-allowed;">2. Start Capture</button>
    </div>

    <a href="/" id="btn-finish" style="display: none; margin-top: 20px; background: #22c55e; padding: 10px 20px; color: white; text-decoration: none; border-radius: 8px;">3. Registration Complete! Login</a>
</div>

<script>
    const employeeName = "{{ employee_name }}";
</script>
<script src="{{ url_for('static', filename='js/face_recognition.js') }}"></script>

</body>
</html>
